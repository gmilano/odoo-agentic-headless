services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  odoo:
    image: odoo:19.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      AGENTIC_HEADLESS_API_KEY: ${AGENTIC_HEADLESS_API_KEY:-dev-agentic-key}
    volumes:
      - ./config/odoo.docker.conf:/etc/odoo/odoo.conf:ro
      - ./custom_addons:/mnt/extra-addons:ro
      - odoo-data:/var/lib/odoo
    command:
      - odoo
      - -d
      - odoo_agentic
      - -i
      - agentic_headless
      - --without-demo=all
      - --dev=reload

volumes:
  odoo-db:
  odoo-data:

